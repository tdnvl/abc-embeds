<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ABC URL Encoder</title>
<style>
  * {
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: linear-gradient(135deg, #f5f7fa 0%, #f0f4f8 100%);
    color: #2c3e50;
    margin: 0;
    padding: 1rem;
    min-height: 100vh;
  }

  .container {
    max-width: 700px;
    margin: 2rem auto;
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08), 0 4px 16px rgba(0, 0, 0, 0.04);
    padding: 2rem;
  }

  h1 {
    font-size: 1.75rem;
    font-weight: 700;
    margin: 0 0 0.5rem 0;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  p {
    color: #7f8c8d;
    margin: 0 0 1.5rem 0;
    font-size: 0.95rem;
    line-height: 1.6;
  }

  .field-group {
    margin-bottom: 1.5rem;
  }

  label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    color: #34495e;
    margin-bottom: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  textarea {
    width: 100%;
    height: 160px;
    font-family: "Monaco", "Menlo", "Ubuntu Mono", monospace;
    font-size: 0.9rem;
    padding: 1rem;
    border: 2px solid #ecf0f1;
    border-radius: 8px;
    background: #fafbfc;
    color: #2c3e50;
    resize: vertical;
    transition: all 0.2s ease;
    line-height: 1.5;
  }

  textarea:focus {
    outline: none;
    border-color: #667eea;
    background: white;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
  }

  textarea::placeholder {
    color: #bdc3c7;
  }

  input {
    width: 100%;
    padding: 0.75rem 1rem;
    font-family: "Monaco", "Menlo", "Ubuntu Mono", monospace;
    font-size: 0.9rem;
    border: 2px solid #ecf0f1;
    border-radius: 8px;
    background: #fafbfc;
    color: #2c3e50;
    transition: all 0.2s ease;
  }

  input:focus {
    outline: none;
    border-color: #667eea;
    background: white;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
  }

  input::placeholder {
    color: #bdc3c7;
  }

  input:read-only {
    background: #f8f9fa;
    cursor: not-allowed;
  }

  .button-group {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    margin-top: 1.5rem;
  }

  button {
    flex: 1;
    min-width: 140px;
    padding: 0.75rem 1.5rem;
    font-size: 0.95rem;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.5px;
  }

  #generate {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
  }

  #generate:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(102, 126, 234, 0.4);
  }

  #generate:active {
    transform: translateY(0);
  }

  #copy {
    background: #ecf0f1;
    color: #2c3e50;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
  }

  #copy:hover:not(:disabled) {
    background: #d5dbdb;
    transform: translateY(-2px);
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.12);
  }

  #copy:active:not(:disabled) {
    transform: translateY(0);
  }

  #copy:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  #copy-confirm {
    display: none;
    color: #27ae60;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 0.75rem 1rem;
    background: #d5f4e6;
    border-radius: 8px;
    white-space: nowrap;
    align-self: center;
  }

  /* Mobile responsiveness */
  @media (max-width: 600px) {
    .container {
      padding: 1.5rem;
      margin: 1rem auto;
    }

    h1 {
      font-size: 1.5rem;
    }

    .button-group {
      gap: 0.5rem;
    }

    button {
      min-width: 100px;
      padding: 0.65rem 1rem;
      font-size: 0.9rem;
    }

    textarea {
      height: 140px;
      font-size: 0.85rem;
    }

    input {
      font-size: 0.85rem;
    }

    #copy-confirm {
      font-size: 0.8rem;
      padding: 0.5rem 0.75rem;
    }
  }

  .footer {
    margin-top: 2.5rem;
    padding-top: 2rem;
    border-top: 1px solid #ecf0f1;
    text-align: center;
  }

  .footer a {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    color: #7f8c8d;
    text-decoration: none;
    font-size: 0.9rem;
    transition: all 0.2s ease;
  }

  .footer a:hover {
    color: #667eea;
  }

  .github-icon {
    width: 20px;
    height: 20px;
    display: inline-block;
  }

  .github-icon svg {
    width: 100%;
    height: 100%;
    fill: currentColor;
  }

  @media (max-width: 400px) {
    .container {
      padding: 1rem;
    }

    h1 {
      font-size: 1.25rem;
    }

    p {
      font-size: 0.9rem;
    }

    .button-group {
      flex-direction: column;
    }

    button {
      width: 100%;
      min-width: auto;
    }

    .footer a {
      font-size: 0.85rem;
    }

    .github-icon {
      width: 18px;
      height: 18px;
    }
  }
</style>
</head>
<body>
  <div class="container">
    <h1>ABC to URL Encoder</h1>
    <p>Paste your ABC notation below and click "Generate" to create a shareable URL.</p>
    
    <div class="field-group">
      <label for="abc">ABC Notation</label>
      <textarea id="abc" placeholder="Paste your ABC notation here"></textarea>
    </div>

    <button id="generate">Generate URL</button>

    <div class="field-group" style="margin-top: 1.5rem;">
      <label for="result">Encoded URL</label>
      <input id="result" readonly placeholder="Encoded URL appears here" />
    </div>

    <div class="button-group">
      <button id="copy" disabled>Copy URL</button>
      <span id="copy-confirm">✓ Copied!</span>
    </div>

    <div class="footer">
      <a href="https://github.com/tdnvl/abc-embeds/" target="_blank" rel="noopener noreferrer">
        <span class="github-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.6.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v 3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
          </svg>
        </span>
        View on GitHub
      </a>
    </div>
  </div>

  <script>
    const base = "https://tdnvl.github.io/abc-embeds/tune.html";
    const abcField = document.getElementById("abc");
    const resultField = document.getElementById("result");
    const copyButton = document.getElementById("copy");
    const copyConfirm = document.getElementById("copy-confirm");

    document.getElementById("generate").onclick = () => {
      const abc = abcField.value.trim();
      if (!abc) return;
      const url = `${base}?abc=${encodeURIComponent(abc)}`;
      resultField.value = url;
      copyButton.disabled = false;
      copyConfirm.style.display = "none";
    };

    copyButton.onclick = async () => {
      try {
        await navigator.clipboard.writeText(resultField.value);
        copyConfirm.style.display = "inline-block";
        setTimeout(() => (copyConfirm.style.display = "none"), 1500);
      } catch (err) {
        alert("Could not copy URL: " + err);
      }
    };
  </script>
</body>
</html>
